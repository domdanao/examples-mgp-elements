<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Examples — Magpie Components</title>
  <link rel="icon" type="image/png" href="/magpie-logo.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #F2F2F7;
      color: #1C1C1E;
      min-height: 100vh;
      padding: 60px 24px 120px;
    }

    .header {
      max-width: 960px;
      margin: 0 auto 48px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .header-logo {
      width: 48px;
      height: 48px;
      flex-shrink: 0;
    }
    
    .header-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    
    .header-text {
      flex: 1;
    }

    .header h1 {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #1C1C1E;
    }

    .header p {
      font-size: 16px;
      color: #6B6B6B;
      margin-top: 8px;
      line-height: 1.5;
    }

    .grid {
      max-width: 960px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07), 0 0 0 1px rgba(0,0,0,0.04);
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.04);
    }

    .card:active { transform: translateY(-1px); }

    /* Iframe preview */
    .preview {
      width: 100%;
      height: 200px;
      overflow: hidden;
      position: relative;
      background: linear-gradient(135deg, #F5F5F7 0%, #E8E8ED 100%);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .preview-fallback {
      text-align: center;
      color: #8E8E93;
      font-size: 13px;
    }
    
    .preview-fallback svg {
      width: 48px;
      height: 48px;
      fill: #C7C7CC;
      margin-bottom: 8px;
    }

    .preview iframe {
      width: 680px;
      height: 480px;
      border: none;
      transform: scale(0.5);
      transform-origin: top left;
      pointer-events: none;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* Transparent overlay so clicks go to the <a>, not the iframe */
    .preview::after {
      content: '';
      position: absolute;
      inset: 0;
    }

    .card-body {
      padding: 18px 20px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #1C1C1E;
    }

    .card-desc {
      font-size: 13px;
      color: #6B6B6B;
      line-height: 1.45;
      flex: 1;
    }

    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 10px;
      font-size: 13px;
      font-weight: 500;
      color: #007AFF;
    }

    .card-link svg { width: 12px; height: 12px; fill: currentColor; }

    /* Glass Nav */
    .glass-nav {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 2px;
      padding: 6px;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 22px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.14), inset 0 1px 0 rgba(255,255,255,0.8);
      z-index: 9999;
      white-space: nowrap;
    }

    .glass-nav a {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
      border-radius: 16px;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      text-decoration: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      transition: background 0.15s, color 0.15s;
    }

    .glass-nav a.nav-home { padding: 8px 12px; }
    .glass-nav a.nav-home svg { width: 16px; height: 16px; fill: currentColor; }
    .glass-nav a:hover { background: rgba(0,0,0,0.07); }
    .glass-nav a.active { background: rgba(0,0,0,0.1); color: #111; font-weight: 600; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-logo"><img src="/magpie-logo.png" alt="Magpie"></div>
    <div class="header-text">
      <h1>Magpie Components — Examples</h1>
      <p>Live previews of different integration styles. Click any card to open the full example.</p>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <nav class="glass-nav">
    <a href="/examples/index.html" class="nav-home active" title="Home">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </a>
    <a href="/examples/01-basic/index.html">Basic</a>
    <a href="/examples/02-stripe/index.html">Stripe</a>
    <a href="/examples/03-kitschy/index.html">Kitschy</a>
    <a href="/examples/04-brutalist/index.html">Brutalist</a>
    <a href="/examples/05-full-form/index.html">Full Form</a>
  </nav>

  <script>
    const examples = [
      {
        href: '/examples/01-basic/index.html',
        title: 'Basic',
        desc: 'Minimal integration with no styling. The bare essentials to get up and running.',
      },
      {
        href: '/examples/02-stripe/index.html',
        title: 'Stripe Style',
        desc: 'Clean, professional design inspired by Stripe Checkout. Subtle shadows and focus rings.',
      },
      {
        href: '/examples/03-kitschy/index.html',
        title: 'Kitschy',
        desc: 'Loud, colorful, and animated. Gradient backgrounds, Comic Sans, and bouncing emoji.',
      },
      {
        href: '/examples/04-brutalist/index.html',
        title: 'Brutalist',
        desc: 'Raw and stark. Monospace font, heavy black borders, zero decoration.',
      },
      {
        href: '/examples/05-full-form/index.html',
        title: 'Full Form',
        desc: 'Every available field: card address, owner billing & shipping, redirect URLs, and metadata.',
      },
    ];

    const grid = document.getElementById('grid');

    examples.forEach(function(ex) {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = ex.href;
      a.innerHTML = `
        <div class="preview">
          <iframe src="${ex.href}" loading="lazy" tabindex="-1" aria-hidden="true" sandbox="allow-scripts allow-same-origin allow-forms" onerror="this.style.display='none'"></iframe>
        </div>
        <div class="card-body">
          <div class="card-title">${ex.title}</div>
          <div class="card-desc">${ex.desc}</div>
          <div class="card-link">
            Open example
            <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
          </div>
        </div>
      `;
      grid.appendChild(a);
    });
  </script>

</body>
</html>
